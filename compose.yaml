services:
  postgres:
    image: 'postgres:16'
    container_name: devdesk-postgres
    environment:
      - 'POSTGRES_DB=devdesk'
      - 'POSTGRES_PASSWORD=devdesk_pass'
      - 'POSTGRES_USER=devdesk_user'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: